version: 0.2

phases:
  # install:
  #   commands:
  #     - echo "No install needed for static HTML"

  # pre_build:
  #   commands:
  #     - echo "Preparing deployment..."

  build:
    commands:
      - echo "Uploading files to S3..."
      - aws s3 cp index.html s3://test123-frontend/index.html
  
  post_build:
    commands:
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id E1AKZ0MTLLWD2D --paths "/*"
      - echo "Deployment completed successfully."

artifacts:
  files:
    - index.html